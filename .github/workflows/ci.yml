name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: ./test.sh

      - name: Build universal app
        run: ./build.sh --universal

      - name: Verify binary architectures
        run: lipo -archs ClaudeDeck.app/Contents/MacOS/ClaudeDeck | grep -q "x86_64 arm64\|arm64 x86_64"

      - name: Smoke test
        run: ./ClaudeDeck.app/Contents/MacOS/ClaudeDeck --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeDeck.app
          path: ClaudeDeck.app
